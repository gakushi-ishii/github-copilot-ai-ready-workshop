# Docker Desktop でランタイムだけをコンテナに分離して開発するための構成。
# コードはホスト側（バインドマウント）、Node/依存はコンテナ内。
# 使い方: docker compose up  → ブラウザ / キャンバスで http://localhost:5173/
services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      # ホストのソースをマウント（Agent はホスト側のファイルを編集）
      - .:/app
      # node_modules はコンテナ内ボリュームに隔離（ホストと混ざらない）
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # バインドマウント越しでも HMR を効かせるためポーリングを有効化
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
